# ============================================
# SGSI - Laboratorio Docker Fase 1 (Optimizado RAM)
# 8 contenedores (~1.65 GB RAM) — Kali desde host
# Sin Elasticsearch/Kibana/Wazuh: logs centralizados en volumen compartido
# ============================================

networks:
  sgsi-lab:
    name: ${LAB_NETWORK}
    driver: bridge
    ipam:
      config:
        - subnet: ${LAB_SUBNET}

volumes:
  postgres-erp-data:
  postgres-cctv-data:
  odoo-web-data:
  minio-data:
  ldap-data:
  mariadb-data:
  mongodb-data:
  certbot-data:
  # Logs centralizados como pseudo-SIEM (lightweight)
  sgsi-logs:
    name: sgsi-logs
    external: false

services:
  # ============================================
  # 1. ERP Odoo (SW-01) — objetivo de 4 simulaciones
  # ============================================
  odoo:
    image: odoo:${ODOO_VERSION}
    container_name: sgsi-odoo
    restart: unless-stopped
    networks: [sgsi-lab]
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./data/odoo/extra-addons:/mnt/extra-addons
      - sgsi-logs:/var/log/odoo
    environment:
      HOST: postgres-erp
      USER: ${POSTGRES_ERP_USER}
      PASSWORD: ${POSTGRES_ERP_PASSWORD}
    ports:
      - "8069:8069"   # Odoo web
    depends_on:
      postgres-erp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/login"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # 2. PostgreSQL ERP + CCTV (SW-06 + IF-02)
  # Fusión D — Postgres-cctv pasa a ser otra BD del mismo server
  # ============================================
  postgres-erp:
    image: postgres:${POSTGRES_VERSION}
    container_name: sgsi-postgres
    restart: unless-stopped
    networks: [sgsi-lab]
    volumes:
      - postgres-erp-data:/var/lib/postgresql/data
      - ./data/postgres/init:/docker-entrypoint-initdb.d
      - sgsi-logs:/var/log/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_ERP_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ERP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_ERP_DB}
      # Crea BDs adicionales en la misma instancia (odoo_db + postgres_cctv)
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ERP_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # 3. Nginx-vuln (HW-02/HW-03/SW-04/SW-02/HW-09/SW-05/IF-07)
  # Punto de entrada perimetral con vulns intencionales
  # ============================================
  nginx-vuln:
    image: nginx:alpine
    container_name: sgsi-nginx-vuln
    restart: unless-stopped
    networks: [sgsi-lab]
    volumes:
      - ./configs/nginx-vuln/default.conf:/etc/nginx/conf.d/default.conf:ro
      - sgsi-logs:/var/log/nginx
      - ./data/nginx-ssl:/etc/nginx/ssl:ro
      - ./data/nginx-print:/var/www/print:ro
      - ./data/nginx-auth:/etc/nginx/auth:ro
      - ./data/nginx-repo:/var/www/repo:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - odoo
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/", "-o", "/dev/null", "--max-time", "5"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # 4. Minio (HW-05/IF-06) — NAS + backups
  # ============================================
  minio:
    image: minio/minio
    container_name: sgsi-minio
    restart: unless-stopped
    networks: [sgsi-lab]
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
      - sgsi-logs:/var/log/minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # 5. LDAP (HW-08+10, SW-07, SW-08) — gestión identidad
  # ============================================
  ldap-server:
    image: osixia/openldap:1.5.0
    container_name: sgsi-ldap
    restart: unless-stopped
    networks: [sgsi-lab]
    volumes:
      - ldap-data:/var/lib/ldap
      - sgsi-logs:/var/log
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_TLS: "false"
      KEEP_EXISTING_CONFIG: "true"
    ports:
      - "389:389"
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-b", "${LDAP_BASE_DN}", "-D", "cn=admin,${LDAP_BASE_DN}", "-w", "${LDAP_ADMIN_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # 6. MariaDB (IF-09) — inventario
  # ============================================
  mariadb-inventario:
    image: mariadb:${MARIADB_VERSION}
    container_name: sgsi-mariadb
    restart: unless-stopped
    networks: [sgsi-lab]
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./data/mariadb/init:/docker-entrypoint-initdb.d
      - sgsi-logs:/var/log/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DB}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # 7. MongoDB (IF-10) — nómina
  # ============================================
  mongodb-nomina:
    image: mongo:${MONGO_VERSION}
    container_name: sgsi-mongodb
    restart: unless-stopped
    networks: [sgsi-lab]
    volumes:
      - mongodb-data:/data/db
      - ./data/mongodb/init:/docker-entrypoint-initdb.d
      - sgsi-logs:/var/log/mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # 8. Certbot (IF-08) — simulación SSL/TLS
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: sgsi-certbot
    networks: [sgsi-lab]
    volumes:
      - certbot-data:/etc/letsencrypt
      - ./data/nginx-ssl:/etc/nginx/ssl
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    # No puerto expuesto — se invoca manualmente para simular renovación/expiración
    # IF-08: detener renew y observar error TLS

# ============================================
# Notas:
#
# SIEM Lightweight: Todos los servicios montan el volumen `sgsi-logs` y
# escriben sus logs en él. En vez de Elasticsearch/Wazuh, se revisa con:
#   docker run --rm -v sgsi-logs:/logs alpine sh -c "ls /logs && tail -f /logs/*/*.log"
# O desde el host:
#   sudo ls /var/lib/docker/volumes/sgsi-logs/_data/
#
# Kali-attacker: opción C — se usa el propio host Kali (opencode corre ahí).
# Herramientas requeridas en host: nmap, hydra, sqlmap, metasploit-framework,
# ffplay, tcpdump, curl, jq, mongosh, psql, mysql, ldap-utils, gophish.
# Instalar con: sudo apt install -y kali-defaults nmap hydra sqlmap metasploit-framework tcpdump jq ldap-utils
# ============================================
