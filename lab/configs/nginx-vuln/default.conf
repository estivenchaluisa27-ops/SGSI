# nginx-vuln — Router/Firewall perimetral con vulnerabilidades intencionales
# Cubre HW-02, HW-03, SW-04 (fuerza bruta RDP proxy), SW-02 (RTSP capture)
# No exponer en producción — solo laboratorio SGSI

upstream odoo_backend {
    server odoo:8069;
}

upstream rdp_backend {
    # SW-04: RDP simulado (puerto falso — fuerza bruta contra hydra)
    server 127.0.0.1:3389;
}

server {
    listen 80;
    listen 443 ssl;
    server_name localhost;

    # Vulnerabilidad 1: SSL/TLS obsoleto permitido
    ssl_protocols SSLv3 TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_certificate /etc/nginx/ssl/self-signed.crt;
    ssl_certificate_key /etc/nginx/ssl/self-signed.key;

    # Vulnerabilidad 2: Sin cabeceras de seguridad
    # No server_tokens off, no HSTS, no X-Frame-Options, no CSP

    # Vulnerabilidad 3: Sin rate limiting — permite fuerza bruta
    # No limit_req_zone

    # Vulnerabilidad 4: Logs versátiles (para que SIEM tenga algo que morder)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Endpoint perimetral — proxy al ERP Odoo
    location / {
        proxy_pass http://odoo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Vulnerabilidad 5: Forward X-Forwarded-For sin sanitizar — permite spoofing
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Vulnerabilidad 6: RTSP simulado — sin cifrado (SW-02 intercepción video)
    location /rtsp/ {
        # Stream de video simulado — capturable con tcpdump/ffplay
        proxy_pass http://127.0.0.1:8554;
    }

    # Vulnerabilidad 7: Endpoint de spool de impresión sin auth (HW-09)
    location /print/ {
        alias /var/www/print/;
        autoindex on;
    }

    # Vulnerabilidad 8: Endpoint de API exposed (SW-05 Zendesk sim)
    location /api/ {
        # Sin auth, sin rate limit — permite exfiltración de API tokens
        proxy_pass http://127.0.0.1:5000;
    }

    # Vulnerabilidad 9: WAF simulado — bypass fácil (validar A.8.20, A.8.22)
    location /admin/ {
        # A.8.5 auth débil — las credenciales por defecto son admin/admin
        proxy_set_header X-Admin-User admin;
        proxy_pass http://odoo_backend/web/database/manager;
    }

    # Vulnerabilidad 10: Logs accesibles sin auth (IF-07 — borrado evidencias)
    location /logs/ {
        alias /var/log/nginx/;
        autoindex on;
    }
}
